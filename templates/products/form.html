{% extends 'base.html' %}
{% load crispy_forms_tags %}
{% block title %}{{ title }} — Zain Market{% endblock %}
{% block content %}
<div class="row justify-content-center">
  <div class="col-md-7">
    <div class="card p-4">
      <h4 class="fw-bold mb-4">{{ title }}</h4>
      <form method="post" enctype="multipart/form-data">
        {% csrf_token %}
        {{ form|crispy }}
        <div class="d-flex gap-2 mt-3">
          <button class="btn btn-primary">Save</button>
          <a href="{% url 'admin_products' %}" class="btn btn-outline-secondary">Cancel</a>
        </div>
      </form>
    </div>
  </div>
</div>
{% endblock %}
