{% extends 'base.html' %}
{% load crispy_forms_tags %}
{% block title %}Register — Zain Market{% endblock %}
{% block content %}
<div class="row justify-content-center">
  <div class="col-md-5">
    <div class="card p-4">
      <h4 class="fw-bold text-center mb-4">Account Banao</h4>
      <form method="post">
        {% csrf_token %}
        {{ form|crispy }}
        <button class="btn btn-primary w-100 mt-3">Register</button>
      </form>
      <p class="text-center mt-3 small">
        Pehle se account hai? <a href="{% url 'login' %}">Login Karo</a>
      </p>
    </div>
  </div>
</div>
{% endblock %}
